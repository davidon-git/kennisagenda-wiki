<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kennisagenda Wiki — Provincie Utrecht</title>
<style>
:root {
  --rood: #EC0000; --rood-donker: #C00D0D; --zwart: #000;
  --grijs-40: #B0B0B0; --grijs-20: #D4D4D4; --wit: #fff;
  --blauw: #004488; --cyaan: #0097c8; --turkoois: #00866f;
  --groen: #13a538; --geel: #f5c400; --oranje: #f39200;
  --paars: #79176f; --roodroze: #c7475c;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--wit); color: var(--zwart); line-height: 1.6;
}
a { color: var(--blauw); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Buttons / back links */
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; color: #888; cursor: pointer;
  border: none; background: none; padding: 8px 12px;
  border-radius: 6px; transition: background .12s;
}
.back-link:hover { background: #f0f0f0; color: #000; }

/* Breadcrumb */
.top-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 28px; border-bottom: 1px solid #eee;
  font-size: 13px; color: #888;
}
.top-bar a { color: #888; cursor: pointer; }
.top-bar a:hover { color: #000; }
.top-bar .current { color: #333; font-weight: 500; }

/* ============================
   MOSAIC PAGE — compact full-width layout
   ============================ */
.mosaic-page {
  max-width: 1100px; margin: 0 auto; padding: 20px 24px;
}

/* Outer layout: 3 stacked rows */
.mosaic-row { display: flex; gap: 2px; margin-bottom: 2px; }
.mosaic-row:last-child { margin-bottom: 0; }

/* Top/bottom rows: two equal blocks */
.mosaic-row-wide { }
.mosaic-row-wide > * { flex: 1; min-width: 0; }

/* Middle row: 3 sections */
.mosaic-row-mid { }
.mosaic-row-mid > * { min-width: 0; }
.mosaic-row-mid .side-block { flex: 1; }
.mosaic-row-mid .mid-cluster { flex: 0 0 auto; display: flex; }

/* The 3×3 tile cluster: a mini-grid */
.mosaic-cluster {
  display: grid;
  grid-template-columns: 86px 172px 86px;
  grid-template-rows: 86px 86px 86px;
  gap: 2px;
}
.mosaic-tile {
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform .2s, filter .2s;
}
.mosaic-tile:hover { transform: scale(1.08); filter: brightness(1.12); }
.mosaic-tile svg { width: 40px; height: 40px; }

/* 6 small tiles position */
.tile-1 { grid-column: 1; grid-row: 1; }
.tile-2 { grid-column: 3; grid-row: 1; }
.tile-3 { grid-column: 1; grid-row: 2; }
.tile-4 { grid-column: 3; grid-row: 2; }
.tile-5 { grid-column: 1; grid-row: 3; }
.tile-6 { grid-column: 3; grid-row: 3; }

/* Center red square spans 2×2 */
.mosaic-center {
  grid-column: 2; grid-row: 1 / 4;
  background: var(--rood);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; color: var(--wit);
}
.mosaic-center .label {
  font-size: 20px; font-weight: 700; line-height: 1.2; padding: 0 10px;
}
.mosaic-center .sub-label {
  font-size: 12px; color: rgba(255,255,255,.7); margin-top: 4px;
}
.mosaic-center svg {
  width: 32px; height: 32px; margin-bottom: 6px;
}

.theme-block {
  border-radius: 0;
  cursor: pointer; overflow: hidden;
  transition: transform .15s, box-shadow .15s;
}
.theme-block:hover { transform: translateY(-1px); box-shadow: 0 3px 12px rgba(0,0,0,.1); }

.theme-block .block-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  color: var(--wit); font-weight: 700; font-size: 15px;
  letter-spacing: .3px;
}
.theme-block .block-header svg { width: 26px; height: 26px; flex-shrink: 0; }

.theme-block .block-body {
  display: flex; min-height: 100px;
}

/* Middle-row side blocks: narrower → stack vertically */
.side-block .block-body {
  flex-direction: column;
}
.side-block .kennisbehoefte-box {
  width: 100%; border-left: none; border-top: 1px solid rgba(0,0,0,.06);
}

.theme-block .block-text {
  flex: 1; padding: 12px 16px;
  font-size: 13px; line-height: 1.55; color: #333;
}

.theme-block .kennisbehoefte-box {
  width: 240px; flex-shrink: 0;
  padding: 12px 14px;
  border-left: 1px solid rgba(0,0,0,.06);
  font-size: 12px; line-height: 1.5;
}
.theme-block .kennisbehoefte-box .kb-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; margin-bottom: 4px;
}
.theme-block .kennisbehoefte-box .kb-text {
  font-style: italic; color: #444;
}

.theme-block .block-count {
  display: inline-block; font-size: 11px; color: #999;
  margin-top: 8px;
}

/* Colors per theme */
.theme-kwaliteit-van-leven .block-header,
.theme-kwaliteit-van-leven.mosaic-section { background: var(--cyaan); }
.theme-kwaliteit-van-leven .block-body { background: #e8f4fa; }
.theme-kwaliteit-van-leven .kennisbehoefte-box { background: #dceef5; }

.theme-verbonden-samenleving .block-header,
.theme-verbonden-samenleving.mosaic-section { background: var(--roodroze); }
.theme-verbonden-samenleving .block-body { background: #f9edf0; }
.theme-verbonden-samenleving .kennisbehoefte-box { background: #f5e4e8; }

.theme-demografie .block-header,
.theme-demografie.mosaic-section { background: var(--turkoois); }
.theme-demografie .block-body { background: #e6f2ef; }
.theme-demografie .kennisbehoefte-box { background: #d9ebe5; }

.theme-ai-digitalisering .block-header,
.theme-ai-digitalisering.mosaic-section { background: var(--blauw); }
.theme-ai-digitalisering .block-body { background: #e6ecf2; }
.theme-ai-digitalisering .kennisbehoefte-box { background: #d9e1eb; }

.theme-toekomstbehendigheid .block-header,
.theme-toekomstbehendigheid.mosaic-section { background: var(--paars); }
.theme-toekomstbehendigheid .block-body { background: #f0eaf2; }
.theme-toekomstbehendigheid .kennisbehoefte-box { background: #e7dde9; }

.theme-eu-internationaal .block-header,
.theme-eu-internationaal.mosaic-section { background: var(--oranje); }
.theme-eu-internationaal .block-body { background: #fdf3e6; }
.theme-eu-internationaal .kennisbehoefte-box { background: #f5e8d7; }

/* ============================
   THEME PAGE
   ============================ */
.theme-page { max-width: 1000px; margin: 0 auto; padding: 24px 24px; }
.theme-page h1 { font-size: 30px; font-weight: 800; margin-bottom: 4px; }
.theme-page .meta { font-size: 13px; color: #777; margin-bottom: 20px; }
.theme-intro { font-size: 14px; line-height: 1.65; color: #333; margin-bottom: 28px; padding: 18px 20px; background: #f8f8f8; border-radius: 10px; }
.theme-intro .kb { margin-top: 10px; font-size: 13px; }
.theme-intro .kb strong { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #555; }
.subtopic-list { border-top: 1px solid #eee; padding-top: 2px; }
.subtopic-item {
  display: flex; align-items: center; gap: 16px; padding: 14px 18px;
  border-bottom: 1px solid #eee; cursor: pointer; transition: background .12s;
}
.subtopic-item:hover { background: #f5f5f5; }
.subtopic-item .num {
  width: 36px; height: 36px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  font-size: 14px; font-weight: 700; color: #fff;
}
.subtopic-item .info { flex: 1; }
.subtopic-item .info h3 { font-size: 15px; font-weight: 600; margin-bottom: 1px; }
.subtopic-item .info p { font-size: 12px; color: #888; }
.subtopic-item .arrow { color: #ccc; font-size: 16px; }
.subtopic-item:hover .arrow { color: var(--rood); }

/* ============================
   WIKI PAGE
   ============================ */
.wiki-page { max-width: 900px; margin: 0 auto; padding: 24px 24px; }
.wiki-page h1 { font-size: 28px; font-weight: 800; margin-bottom: 4px; line-height: 1.2; }
.wiki-page .wiki-meta { font-size: 12px; color: #888; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #ddd; }
.wiki-content { font-size: 15px; line-height: 1.75; color: #222; }
.wiki-content h2 { font-size: 21px; font-weight: 700; margin: 28px 0 10px; padding-bottom: 5px; border-bottom: 2px solid var(--rood); }
.wiki-content h3 { font-size: 17px; font-weight: 600; margin: 22px 0 7px; color: #333; }
.wiki-content p { margin-bottom: 12px; }
.wiki-content ul, .wiki-content ol { margin: 8px 0 12px 22px; }
.wiki-content li { margin-bottom: 5px; }
.wiki-content blockquote { margin: 14px 0; padding: 10px 18px; background: #f5f5f5; border-left: 4px solid var(--rood); border-radius: 0 6px 6px 0; font-style: italic; color: #444; }
.wiki-content table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 14px; }
.wiki-content th, .wiki-content td { padding: 7px 10px; border: 1px solid #ddd; text-align: left; }
.wiki-content th { background: #f0f0f0; font-weight: 600; }

.citation-sup {
  display: inline-flex; align-items: center; justify-content: center;
  vertical-align: super; font-size: 10px; font-weight: 700;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--rood); color: #fff;
  cursor: pointer; margin: 0 1px; line-height: 1;
  position: relative;
}
.citation-sup:hover { background: var(--rood-donker); text-decoration: none; }
.citation-sup:hover::after {
  content: attr(data-tooltip);
  position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; font-size: 12px; font-weight: 400;
  padding: 5px 9px; border-radius: 5px; white-space: nowrap;
  max-width: 380px; overflow: hidden; text-overflow: ellipsis;
  z-index: 10; pointer-events: none;
}

.wiki-sources { margin-top: 36px; padding: 20px; background: #f8f8f8; border-radius: 10px; border: 1px solid #eee; }
.wiki-sources h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 14px; }
.source-item { display: flex; gap: 7px; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #eee; align-items: baseline; }
.source-item:last-child { border-bottom: none; }
.source-num { font-weight: 700; color: var(--rood); min-width: 22px; font-size: 11px; }
.source-text { color: #444; line-height: 1.4; }
.source-text a { font-weight: 600; }
.source-text .page { color: #888; font-size: 12px; }

.wiki-nav { margin-top: 20px; padding: 18px; background: #f0f4f8; border-radius: 10px; border-left: 4px solid var(--blauw); }
.wiki-nav h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 8px; }
.wiki-nav .links { display: flex; flex-wrap: wrap; gap: 10px; }
.wiki-nav .links a { font-size: 13px; padding: 5px 12px; border-radius: 20px; background: #fff; border: 1px solid #ddd; color: var(--blauw); font-weight: 500; }
.wiki-nav .links a:hover { border-color: var(--blauw); background: #e8f0f8; text-decoration: none; }
.wiki-tags { margin-top: 10px; }
.wiki-tags .tag { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid #ddd; color: #888; margin: 2px; }

.empty-state { text-align: center; padding: 40px; color: #888; }

@media (max-width: 800px) {
  .mosaic-row { flex-direction: column; }
  .mosaic-row-mid { flex-wrap: wrap; }
  .mosaic-row-mid .side-block { flex: 1 1 100%; min-width: 0; }
  .mosaic-row-mid .mid-cluster { flex: 1 1 100%; justify-content: center; }
  .mosaic-cluster { margin: 0 auto; }
  .theme-block .block-body { flex-direction: column; }
  .theme-block .kennisbehoefte-box { width: 100%; border-left: none; border-top: 1px solid rgba(0,0,0,.06); }
}
</style>
</head>
<body>

<div id="topBar" class="top-bar"></div>

<div id="app">
  <div class="empty-state">
    <h2>Wiki wordt geladen...</h2>
    <p>Even geduld, de kenniswiki wordt opgestart.</p>
  </div>
</div>

<script src="wiki-data.js"></script>
<script>
// ====== THEME DEFINITIONS ======
const THEMES = {
  'kwaliteit-van-leven': {
    id: 'kwaliteit-van-leven', title: 'Kwaliteit van leven (brede welvaart)',
    shortTitle: 'Kwaliteit van leven', sub: 'brede welvaart',
    color: '#0097c8', bodyBg: '#e8f4fa',
    icon: `<svg viewBox="0 0 48 48" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20c0-6 4-10 12-10s12 4 12 10c0 8-12 18-12 18s-12-10-12-18z"/>
      <circle cx="20" cy="18" r="2" fill="white"/><circle cx="28" cy="18" r="2" fill="white"/>
      <path d="M22 24a3 3 0 0 0 4 0"/>
    </svg>`,
    subtitle: 'Welzijn voorbij het BBP',
    desc: 'Brede welvaart gaat over de kwaliteit van leven hier en nu, maar ook over de effecten op latere generaties en mensen elders. Het meet welzijn breder dan alleen economische groei.',
    kennisbehoefte: 'Welke verschillen in kwaliteit van leven bestaan er tussen groepen en regio\'s? Wat zijn de effecten van keuzes op toekomstige generaties?',
    mosaicClass: 'theme-kwaliteit-van-leven'
  },
  'verbonden-samenleving': {
    id: 'verbonden-samenleving', title: 'Verbonden samenleving',
    shortTitle: 'Verbonden samenleving',
    color: '#c7475c', bodyBg: '#f9edf0',
    icon: `<svg viewBox="0 0 48 48" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="16" cy="16" r="4"/><circle cx="32" cy="16" r="4"/>
      <path d="M10 34c0-5 3-10 8-10h12c5 0 8 5 8 10"/>
      <path d="M24 24v4"/><path d="M18 28l6 4 6-4"/>
    </svg>`,
    subtitle: 'Sociale cohesie, migratie & polarisatie',
    desc: 'Feitelijke verschillen tussen groepen in inkomen, opleiding en migratieachtergrond zijn klein, maar de ervaren kloof is groot. Hoe houden we de samenleving verbonden?',
    kennisbehoefte: 'Hoe manifesteren maatschappelijke onrust en polarisatie zich binnen de provincie? Welke factoren versterken of verzwakken de sociale cohesie?',
    mosaicClass: 'theme-verbonden-samenleving'
  },
  'demografie': {
    id: 'demografie', title: 'Demografie',
    shortTitle: 'Demografie',
    color: '#00866f', bodyBg: '#e6f2ef',
    icon: `<svg viewBox="0 0 48 48" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="24" cy="16" r="5"/><path d="M14 36c0-6 4.5-10 10-10s10 4 10 10"/>
      <path d="M10 10l6 6"/><path d="M38 10l-6 6"/>
      <path d="M10 26l6-6"/><path d="M38 26l-6-6"/>
    </svg>`,
    subtitle: 'Groei, vergrijzing & ruimtelijke druk',
    desc: 'Utrecht groeit snel maar vergrijst ook, wat druk legt op wonen, arbeidsmarkt en zorg. De samenstelling van de bevolking verandert ingrijpend.',
    kennisbehoefte: 'Wat zijn de effecten van demografische ontwikkelingen op ruimtelijke opgaven en sociale ongelijkheid? Hoe beïnvloeden ze de provinciale beleidsopgaven?',
    mosaicClass: 'theme-demografie'
  },
  'ai-digitalisering': {
    id: 'ai-digitalisering', title: 'AI en digitalisering',
    shortTitle: 'AI en digitalisering',
    color: '#004488', bodyBg: '#e6ecf2',
    icon: `<svg viewBox="0 0 48 48" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="8" y="10" width="32" height="22" rx="3"/>
      <rect x="12" y="14" width="24" height="14" rx="2"/>
      <circle cx="24" cy="21" r="3" fill="white"/>
      <path d="M24 28v5"/><path d="M18 38h12"/>
      <circle cx="36" cy="10" r="4" fill="white"/>
      <line x1="36" y1="6" x2="36" y2="4" stroke-width="2"/>
      <line x1="40" y1="10" x2="42" y2="10" stroke-width="2"/>
    </svg>`,
    subtitle: 'Kansen, risico\'s & digitale inclusie',
    desc: 'AI biedt enorme kansen maar ook risico\'s zoals digitale uitsluiting, privacyvraagstukken en afhankelijkheid van grote techbedrijven.',
    kennisbehoefte: 'Hoe beïnvloeden deze ontwikkelingen de Utrechtse samenleving en provinciale taken? Wat betekent AI voor de uitvoering van provinciaal beleid?',
    mosaicClass: 'theme-ai-digitalisering'
  },
  'toekomstbehendigheid': {
    id: 'toekomstbehendigheid', title: 'Toekomstbehendigheid',
    shortTitle: 'Toekomstbehendigheid',
    color: '#79176f', bodyBg: '#f0eaf2',
    icon: `<svg viewBox="0 0 48 48" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="24" cy="28" r="12"/>
      <path d="M24 4v8"/><path d="M24 44v-8"/>
      <path d="M4 24h8"/><path d="M40 24h-8"/>
      <path d="M11 11l6 6"/><path d="M37 11l-6 6"/>
      <path d="M11 37l6-6"/><path d="M37 37l-6-6"/>
      <circle cx="24" cy="24" r="3" fill="white"/>
    </svg>`,
    subtitle: 'Flexibel & wendbaar bestuur',
    desc: 'De noodzaak van een flexibele overheid die kan omgaan met complexe, onzekere veranderingen. Niet hiërarchisch maar een lerende organisatie.',
    kennisbehoefte: 'Hoe ziet nieuwe besluitvorming eruit in een weerbare overheid? Welke sturingsfilosofie past bij een adapterende organisatie?',
    mosaicClass: 'theme-toekomstbehendigheid'
  },
  'eu-internationaal': {
    id: 'eu-internationaal', title: 'EU en internationale ontwikkelingen',
    shortTitle: 'EU & internationaal',
    color: '#f39200', bodyBg: '#fdf3e6',
    icon: `<svg viewBox="0 0 48 48" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="24" cy="24" r="14"/>
      <ellipse cx="24" cy="24" rx="8" ry="14"/>
      <path d="M10 24h28"/><path d="M19 10.5a32 32 0 0 0 0 27"/><path d="M29 10.5a32 32 0 0 1 0 27"/>
    </svg>`,
    subtitle: 'Europa, defensie & strategische autonomie',
    desc: 'Internationale ontwikkelingen hebben directe impact op provinciaal beleid — van EU-regelgeving tot geopolitieke spanningen en handelsconflicten.',
    kennisbehoefte: 'Hoe beïnvloeden deze ontwikkelingen de beleidsruimte van de provincie? Welke strategische keuzes zijn nodig?',
    mosaicClass: 'theme-eu-internationaal'
  }
};

const THEME_ARTICLE_COUNTS = {};
for (const aid in WIKI_DATA.thema_index) {
  THEME_ARTICLE_COUNTS[aid] = WIKI_DATA.thema_index[aid].length;
}

// ===== ROUTING =====
function go(hash) { window.location.hash = hash; render(); }

function render() {
  const hash = window.location.hash.slice(1) || '/';
  const app = document.getElementById('app');
  const tb = document.getElementById('topBar');

  if (hash === '/' || hash === '') renderMosaic(app, tb);
  else if (hash.startsWith('/thema/')) renderTheme(hash.replace('/thema/', ''), app, tb);
  else if (hash.startsWith('/wiki/')) renderWiki(hash.replace('/wiki/', ''), app, tb);
  else renderMosaic(app, tb);
}

// ===== MOSAIC PAGE (PDF-inspired) =====
function renderMosaic(app, tb) {
  tb.innerHTML = '';

  /* Build theme block HTML */
  function blockHTML(id, t) {
    const n = THEME_ARTICLE_COUNTS[id] || 0;
    return `<div class="theme-block ${t.mosaicClass}" onclick="go('/thema/${id}')">
      <div class="block-header">${t.icon}<span>${t.title}</span></div>
      <div class="block-body">
        <div class="block-text">
          ${t.desc}
          ${n > 0 ? `<div class="block-count">${n} wiki-artikelen</div>` : ''}
        </div>
        <div class="kennisbehoefte-box">
          <div class="kb-label">■ KENNISBEHOEFTE:</div>
          <div class="kb-text">${t.kennisbehoefte}</div>
        </div>
      </div>
    </div>`;
  }

  /* Single unified mosaic — 3 flex rows, no empty cells */
  app.innerHTML = `<div class="mosaic-page">
    <div class="mosaic-row mosaic-row-wide">
      ${blockHTML('kwaliteit-van-leven', THEMES['kwaliteit-van-leven'])}
      ${blockHTML('verbonden-samenleving', THEMES['verbonden-samenleving'])}
    </div>
    <div class="mosaic-row mosaic-row-mid">
      <div class="side-block">${blockHTML('demografie', THEMES['demografie'])}</div>
      <div class="mid-cluster">
        <div class="mosaic-cluster">
          <div class="mosaic-tile tile-1 theme-kwaliteit-van-leven mosaic-section" onclick="go('/thema/kwaliteit-van-leven')">${THEMES['kwaliteit-van-leven'].icon}</div>
          <div class="mosaic-tile tile-2 theme-verbonden-samenleving mosaic-section" onclick="go('/thema/verbonden-samenleving')">${THEMES['verbonden-samenleving'].icon}</div>
          <div class="mosaic-tile tile-3 theme-demografie mosaic-section" onclick="go('/thema/demografie')">${THEMES['demografie'].icon}</div>
          <div class="mosaic-tile tile-4 theme-ai-digitalisering mosaic-section" onclick="go('/thema/ai-digitalisering')">${THEMES['ai-digitalisering'].icon}</div>
          <div class="mosaic-tile tile-5 theme-toekomstbehendigheid mosaic-section" onclick="go('/thema/toekomstbehendigheid')">${THEMES['toekomstbehendigheid'].icon}</div>
          <div class="mosaic-tile tile-6 theme-eu-internationaal mosaic-section" onclick="go('/thema/eu-internationaal')">${THEMES['eu-internationaal'].icon}</div>
          <div class="mosaic-center">
            <svg viewBox="0 0 48 48" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.5">
              <rect x="4" y="4" width="40" height="40" rx="4"/>
              <path d="M16 20l-4 4 4 4"/><path d="M32 20l4 4-4 4"/>
              <line x1="22" y1="30" x2="26" y2="18"/>
            </svg>
            <div class="label">Thema's strategische kennisagenda</div>
            <div class="sub-label">Klik op een thema</div>
          </div>
        </div>
      </div>
      <div class="side-block">${blockHTML('ai-digitalisering', THEMES['ai-digitalisering'])}</div>
    </div>
    <div class="mosaic-row mosaic-row-wide">
      ${blockHTML('toekomstbehendigheid', THEMES['toekomstbehendigheid'])}
      ${blockHTML('eu-internationaal', THEMES['eu-internationaal'])}
    </div>
  </div>`;
}

// ===== THEME PAGE =====
function renderTheme(themeId, app, tb) {
  const t = THEMES[themeId];
  if (!t) { go('/'); return; }

  tb.innerHTML = `<a onclick="go('/')">Kennisagenda</a><span style="color:#ccc">/</span><span class="current">${t.title}</span>`;

  const articleIds = WIKI_DATA.thema_index[themeId] || [];
  const articles = articleIds.map(id => WIKI_DATA.article_index[id] ? {id, title: WIKI_DATA.article_index[id]} : null).filter(Boolean);

  const items = articles.map((a, i) => {
    const wiki = WIKI_DATA.articles.find(w => w.id === a.id);
    const nCit = wiki ? wiki.sections.filter(s => s.citations?.length).length : 0;
    const nSee = wiki ? wiki.see_also?.length || 0 : 0;
    return `<div class="subtopic-item" onclick="go('/wiki/${a.id}')">
      <div class="num" style="background:${t.color}">${i+1}</div>
      <div class="info"><h3>${a.title}</h3>
        <p>${nCit} bronverwijzingen${nSee ? ` · ${nSee} kruisverbanden` : ''}</p>
      </div>
      <div class="arrow">→</div>
    </div>`;
  }).join('');

  const empty = !articles.length ? `<div class="empty-state">
    <p>Voor dit thema zijn nog geen wiki-artikelen gegenereerd.</p>
  </div>` : '';

  app.innerHTML = `<div class="theme-page">
    <button class="back-link" onclick="go('/')">&larr; Terug naar kennisagenda</button>
    <h1>${t.title}</h1>
    <div class="meta">${t.subtitle}</div>
    <div class="theme-intro">
      <p>${t.desc}</p>
      <div class="kb"><strong>KENNISBEHOEFTE:</strong> ${t.kennisbehoefte}</div>
      ${articles.length ? `<p style="margin-top:10px;font-size:12px;color:#888">${articles.length} wiki-artikelen uit het beleidscorpus</p>` : ''}
    </div>
    <div class="subtopic-list">${items}</div>
    ${empty}
  </div>`;
}

// ===== WIKI PAGE =====
function renderWiki(wikiId, app, tb) {
  const wiki = WIKI_DATA.articles.find(a => a.id === wikiId);
  if (!wiki) { go('/'); return; }

  const t = THEMES[wiki.thema];
  const themeName = t ? t.title : wiki.thema;

  tb.innerHTML = `<a onclick="go('/')">Kennisagenda</a><span style="color:#ccc">/</span><a onclick="go('/thema/${wiki.thema}')">${themeName}</a><span style="color:#ccc">/</span><span class="current">${wiki.title}</span>`;

  const sourceMap = new Map();
  let sourceCounter = 0;

  function getSourceIdx(src) {
    const key = src.source_id?.url || src.source_id?.document_id || src.source_id?.titel || 'unknown';
    if (!sourceMap.has(key)) {
      sourceCounter++;
      sourceMap.set(key, {idx: sourceCounter, source: src.source_id, pages: new Set()});
    }
    if (src.page) sourceMap.get(key).pages.add(src.page);
    return sourceMap.get(key).idx;
  }

  function renderSection(s) {
    if (!s || !s.type) return '';
    const body = s.text ? renderText(s.text) : '';
    const cits = (s.citations || []).map(c => {
      const idx = getSourceIdx(c);
      const tooltip = c.snippet || c.source_id?.titel || `Bron ${idx}`;
      return `<a class="citation-sup" href="${makePdfUrl(c.source_id, c.page)}" target="_blank" data-tooltip="[${idx}] ${escHtml(tooltip)}" title="Open bron ${idx}">${idx}</a>`;
    }).join('');

    switch (s.type) {
      case 'h2': return `<h2>${body}</h2>`;
      case 'h3': return `<h3>${body}</h3>`;
      case 'p': return `<p>${body} ${cits}</p>`;
      case 'blockquote': return `<blockquote>${body}</blockquote>`;
      case 'ul': return `<ul>${(s.items || []).map(i => `<li>${renderText(i)}</li>`).join('')}</ul>`;
      case 'ol': return `<ol>${(s.items || []).map(i => `<li>${renderText(i)}</li>`).join('')}</ol>`;
      case 'table': {
        const h = (s.headers || []).map(h => `<th>${renderText(h)}</th>`).join('');
        const r = (s.rows || []).map(r => `<tr>${r.map(c => `<td>${renderText(c)}</td>`).join('')}</tr>`).join('');
        return `<table><thead><tr>${h}</tr></thead><tbody>${r}</tbody></table>`;
      }
      default: return '';
    }
  }

  const contentHtml = wiki.sections.map(s => renderSection(s)).join('');

  const sourcesHtml = [...sourceMap.entries()].map(([key, val]) => {
    const s = val.source;
    const title = s.titel || 'Onbekend';
    const url = s.url || '#';
    const pages = [...val.pages].filter(p => p).sort();
    const pageStr = pages.length ? `p. ${pages.join(', ')}` : '';
    const pdfLink = s.url ? `<a href="${makePdfUrl(s, pages[0])}" target="_blank">${escHtml(title)}</a>` : escHtml(title);
    const inst = s.instituut ? `${s.instituut} (${s.jaar || '?'})` : '';
    return `<div class="source-item">
      <span class="source-num">[${val.idx}]</span>
      <span class="source-text">${pdfLink}<br>${inst} ${pageStr ? `<span class="page">${pageStr}</span>` : ''}</span>
    </div>`;
  }).join('');

  const seeAlso = (wiki.see_also || []).map(refId => {
    const ref = WIKI_DATA.articles.find(a => a.id === refId);
    if (!ref) return '';
    const t2 = THEMES[ref.thema];
    return `<a href="#/wiki/${ref.id}" style="${t2 ? `border-left: 3px solid ${t2.color}` : ''}">${escHtml(ref.title)}</a>`;
  }).filter(Boolean).join('');

  const tags = (wiki.tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');

  app.innerHTML = `<div class="wiki-page">
    <button class="back-link" onclick="go('/thema/${wiki.thema}')">&larr; Terug naar ${themeName}</button>
    <h1>${wiki.title}</h1>
    <div class="wiki-meta">${wiki.meta}</div>
    <div class="wiki-content">${contentHtml}</div>
    ${sourcesHtml ? `<div class="wiki-sources"><h3>Bronnen</h3>${sourcesHtml}</div>` : ''}
    ${seeAlso ? `<div class="wiki-nav"><h4>Zie ook</h4><div class="links">${seeAlso}</div></div>` : ''}
    ${tags ? `<div style="margin-top:10px">${tags}</div>` : ''}
  </div>`;
}

function makePdfUrl(source, page) {
  if (!source) return '#';
  let url = source.url || '#';
  if (page && url && url !== '#') {
    if (url.endsWith('.pdf') || url.includes('/publicaties/') || url.includes('/documenten/')) {
      const sep = url.includes('#') ? '&' : '#';
      url += `${sep}page=${page}`;
    }
  }
  return url;
}

function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderWikiLinks(text) {
  if (!text) return '';
  return text.replace(/\[\[([^\]:]+):([^\]]+)\]\]/g, '<a href="#/wiki/$1" class="wiki-link">$2</a>');
}

function renderText(text) {
  return renderWikiLinks(escHtml(text));
}

window.addEventListener('hashchange', render);
render();
</script>
